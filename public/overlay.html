<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuardianOS Overlay</title>
    <link rel="stylesheet" href="/css/overlay.css" />
  </head>
  <body>
    <section id="alert" class="guardian-alert">
      <div class="particles"></div>
      <div id="alertIcon" class="alert-icon">🛡️</div>
      <div class="alert-text">
        <div id="alertTitle" class="alert-title">A NEW GUARDIAN ARRIVES</div>
        <div id="alertName" class="alert-name">GuardianKnight42</div>
        <div id="alertAmount" class="alert-amount"></div>
      </div>
      <div class="bottom-crest">GG</div>
    </section>

    <section id="nowPlaying" class="now-playing hidden">
          <div class="vinyl-wrap">
      <div class="vinyl">
        <img id="npAlbumArt" class="np-album-art" />
      </div>

      <div id="tonearm" class="tonearm">
        <div class="tonearm-head"></div>
      </div>
    </div>
      </div>

      <div class="np-info">
        <div class="np-label">NOW PLAYING</div>
        <div id="npTitle" class="np-title">--</div>
        <div id="npArtist" class="np-artist">--</div>
        <div id="npAlbum" class="np-album">--</div>

        <div class="np-progress">
          <div id="npProgressFill" class="np-progress-fill"></div>
        </div>

        <div class="np-time">
          <span id="npElapsed">0:00</span>
          <span id="npDuration">0:00</span>
        </div>
      </div>
    </section>
    <section id="bootScreen" class="boot-screen">

  <img
    src="/assets/branding/guardian-crest-big.png"
    class="boot-logo"
    alt="GuardianOS Crest"
  >

  <h1 class="boot-title">GuardianOS</h1>

<p class="boot-status">Initializing GuardianOS...</p>

 <div class="boot-checks">
  <div class="boot-item">Scene Engine</div>
  <div class="boot-item">Spotify Engine</div>
  <div class="boot-item">Alert Engine</div>
  <div class="boot-item">Widget Engine</div>
  <div class="boot-item">Twitch Engine</div>
  <div class="boot-item">Streamer.bot</div>
  <div class="boot-item">Guardian Core</div>
  <div class="boot-item">System Ready</div>
</div>

</section>
    <section id="startingSoon" class="starting-soon hidden">
  <div class="ss-card">
    <div class="ss-kicker">GuardianOS</div>
    <h1>Starting Soon</h1>
    <div id="startingSoonTimer" class="ss-timer">5:00</div>
    <p>Guardian Gavin will be live shortly</p>
  </div>
</section>

    <script src="/js/overlay.js"></script>
  </body>
</html>
